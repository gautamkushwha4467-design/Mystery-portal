<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="rain.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            margin: 0;
        }

        .button-container {
            display: flex;
        }

        .button-container:first-child {
            margin-bottom: 10px;
        }

        .image-button {
            display: inline-block;
            margin: 10px;
            cursor: pointer;
        }

        .normal-button {
            margin-top: 20px;
    
        }

        /* Blue */
.info {
  border-color: orange;
  color: orange;

}

.info:hover {
  background: orange;
  color: white;
}
   
        
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Mystery Portal</title>
</head>
<body>
    <h1> Mystery portal<br>Victor Sterling</h1>
    
    <div class="button-container">
        <a href="newspaper.jpeg" target="_blank" class="image-button">
            <img src="news.png" alt="News" width="180" height="180"> <!-- Specify the size here -->
        </a>
        <a href="security.jpeg" target="_blank" class="image-button">
            <img src="security.png" alt="Will" width="180" height="180"> <!-- Specify the size here -->
        </a>
    </div>

    <div class="button-container">
        <a href="detectivenotes.html" target="_blank" class="image-button">
            <img src="detective.png" alt="Detective" width="180" height="200"> 
        </a>
        <a href="h.html" target="_blank" class="image-button">
            <img src="interrogate.png" alt="Interrogate"  width="180" height="200">
        </a>
        <a href="Autopsy_report.jpeg" target="_blank" class="image-button">
            <img src="report.png" alt="Interrogate"  width="180" height="200">
        </a>
    </div>

    <!-- Password Protected Button -->
    <button class="info normal-button" onclick="checkPassword()">
        Lets Start
    </button>

    <script>
        function checkPassword() {
            var password = prompt("Enter Password:");

            if (password === "lsabella cruz") {
                window.location.href = "mystery.html";
            } else {
                alert("Incorrect Password!");
            }
        }
    </script>
</body>
</html>
