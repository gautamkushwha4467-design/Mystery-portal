<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Portal</title>

<link rel="stylesheet" href="rain.css">

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
font-family:Arial;
}

h1{
text-align:center;
}

.button-container{
display:flex;
}

.image-button{
margin:10px;
cursor:pointer;
}

.image-button img{
width:180px;
height:180px;
}

.normal-button{
margin-top:20px;
}

.info{
border:2px solid orange;
color:orange;
background:transparent;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.info:hover{
background:orange;
color:white;
}

#viewer{
margin-top:25px;
width:90%;
height:75vh;
border:3px solid orange;
overflow:auto;
background:black;
box-shadow:0 0 20px orange;
}

</style>

</head>


<body>

<h1>Mystery Portal<br>Victor Sterling</h1>


<div class="button-container">

<a href="#" onclick="openFile('newspaper.png'); return false;" class="image-button">
<img src="news.png" alt="News">
</a>

<a href="#" onclick="openFile('security_access_logs.html'); return false;" class="image-button">
<img src="security.png" alt="Security">
</a>

</div>



<div class="button-container">

<a href="#" onclick="openFile('investigator_notes.html'); return false;" class="image-button">
<img src="detective.png" alt="Detective">
</a>

<a  href="#" onclick="openFile('confidential_confessions.html'); return false;" class="image-button">
<img src="interrogate.png" alt="Interrogate">
</a>

<a href="#" onclick="openFile('Autopsy_report.html'); return false;" class="image-button">
<img src="report.png" alt="Report">
</a>

</div>



<button class="info normal-button" onclick="startInvestigation()">
Lets Start
</button>


<!-- Evidence Viewer -->
<div id="viewer"></div>



<script>


/* OPEN FILE INSIDE PORTAL */

function openFile(file){

document.getElementById("viewer").innerHTML =
'<iframe src="'+file+'" style="width:100%;height:100%;border:none;"></iframe>';

}



/* START INVESTIGATION */

function startInvestigation(){

startFullscreen();
checkPassword();

}



/* FULLSCREEN MODE */

function startFullscreen(){

let elem=document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}

}



/* PASSWORD CLUE SYSTEM */

let messages=[
"CLUE: Check the Security Logs carefully.",
"HINT: The autopsy report reveals the real cause of death.",
"NOTE: Someone altered the access logs before midnight."
];

let index=0;

function checkPassword(){

let message=messages[index];

index++;

if(index>=messages.length){
index=0;
}

let password=prompt(message + "\n\nEnter Password:");

if(password && password.trim().toLowerCase()==="4467"){

window.location.href="mystery.html";

}

else{

alert("Incorrect Password!");

}

}



/* MESSAGE ROTATION EVERY 5 MINUTES */

setInterval(function(){

index++;

if(index>=messages.length){
index=0;
}

},300000);



/* TAB SWITCH DETECTION */

document.addEventListener("visibilitychange",function(){

if(document.hidden){

alert("SYSTEM ALERT: Investigation breach detected!");

window.location.href="about:blank";

}

});



/* DISABLE RIGHT CLICK */

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});



/* BLOCK SOME KEYS */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
}

});

</script>

</body>
</html>
