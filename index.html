<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Portal</title>

<link rel="stylesheet" href="rain.css">

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
font-family:Arial;
}

h1{
text-align:center;
}

.button-container{
display:flex;
}

.image-button{
margin:10px;
cursor:pointer;
}

.image-button img{
width:180px;
height:180px;
}

.normal-button{
margin-top:20px;
}

.info{
border:2px solid orange;
color:orange;
background:transparent;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.info:hover{
background:orange;
color:white;
}

/* FULLSCREEN VIEWER */

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
display:none;
}

#closeViewer{
position:absolute;
top:15px;
right:25px;
font-size:30px;
color:white;
cursor:pointer;
z-index:1000;
}

</style>

</head>


<body>

<h1>Mystery Portal<br>Victor Sterling</h1>


<div class="button-container">

<a onclick="openFile('newspaper.jpeg')" class="image-button">
<img src="news.png" alt="News">
</a>

<a onclick="openFile('security_access_logs.html')" class="image-button">
<img src="security.png" alt="Security">
</a>

</div>


<div class="button-container">

<a onclick="openFile('investigator_notes.html')" class="image-button">
<img src="detective.png" alt="Detective">
</a>

<a onclick="openFile('confidential_confessions.html')" class="image-button">
<img src="interrogate.png" alt="Interrogate">
</a>

<a onclick="openFile('Autopsy_report.html')" class="image-button">
<img src="report.png" alt="Report">
</a>

</div>


<button class="info normal-button" onclick="startInvestigation()">
Lets Start
</button>


<!-- Evidence Viewer -->
<div id="viewer">

<span id="closeViewer" onclick="closeViewer()">✖</span>

</div>



<script>

/* OPEN FILE FULLSCREEN */

function openFile(file){

document.getElementById("viewer").style.display="block";

document.getElementById("viewer").innerHTML +=
'<iframe src="'+file+'" width="100%" height="100%" style="border:none;background:white;"></iframe>';

}


/* CLOSE VIEWER */

function closeViewer(){

document.getElementById("viewer").style.display="none";
document.getElementById("viewer").innerHTML='<span id="closeViewer" onclick="closeViewer()">✖</span>';

}


/* START INVESTIGATION */

function startInvestigation(){

startFullscreen();
checkPassword();

}


/* FULLSCREEN MODE */

function startFullscreen(){

let elem=document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}

}


/* PASSWORD CLUE SYSTEM */

let messages=[
"CLUE: Check the Security Logs carefully.",
"HINT: The autopsy report reveals the real cause of death.",
"NOTE: Someone altered the access logs before midnight."
];

let index=0;

function checkPassword(){

let message=messages[index];

index++;

if(index>=messages.length){
index=0;
}

let password=prompt(message + "\n\nEnter Password:");

if(password && password.trim().toLowerCase()==="sxkzb"){

window.location.replace("mystery.html");

}

else{

alert("Incorrect Password!");

}

}


/* MESSAGE ROTATION */

setInterval(function(){

index++;

if(index>=messages.length){
index=0;
}

},300000);


/* TAB SWITCH DETECTION */

document.addEventListener("visibilitychange",function(){

if(document.hidden){

alert("SYSTEM ALERT: Investigation breach detected!");

window.location.href="about:blank";

}

});


/* DISABLE RIGHT CLICK */

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});


/* BLOCK INSPECT KEYS */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
}
if(e.key === "Meta"){
e.preventDefault();
}
if(e.ctrlKey && e.key==="c"){
e.preventDefault();
}
  if(e.ctrlKey && e.key==="v"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
}

});

</script>

</body>
</html>
