<body>
    <h1> Mystery portal<br>Victor Sterling</h1>
    
    <div class="button-container">
        <a href="newspaper.png" target="_blank" class="image-button">
            <img src="news.png" alt="News" width="180" height="180"> <!-- Specify the size here -->

        <a href="security_access_logs.html" target="_blank" class="image-button">
            <img src="security.png" alt="Will" width="180" height="180"> <!-- Specify the size here -->
        </a>
    </div>

    <div class="button-container">
        <a href="investigator_notes.html" target="_blank" class="image-button">
            <img src="detective.png" alt="Detective" width="180" height="200"> 
        </a>
        <a href="confidential_confessions.html" target="_blank" class="image-button">
            <img src="interrogate.png" alt="Interrogate"  width="180" height="200">

        </a>
    </div>

    <!-- Password Protected Button -->
    <button class="info normal-button" onclick="checkPassword()">
        Lets Start
    </button>

    <script>

let messages = [
"CLUE: Check the Security Logs carefully.",
"HINT: The autopsy report reveals the real cause of death.",
"NOTE: Someone altered the access logs before midnight."
];

let index = 0;

function checkPassword() {

    // show one of the messages
    let message = messages[index];

    // change message index
    index++;
    if(index >= messages.length){
        index = 0;
    }

    // password prompt with message
    let password = prompt(message + "\n\nEnter Password:");

    if (password && password.toLowerCase() === "isabella cruz") {
        window.location.href = "mystery.html";
    } 
    else {
        alert("Incorrect Password!");
    }
}

// change message every 5 minutes
setInterval(function(){
    index++;
    if(index >= messages.length){
        index = 0;
    }
}, 300000); // 5 minutes

</script>
<script>
document.addEventListener("visibilitychange", function() {

    if (document.hidden) {
        alert("Warning: Switching tabs is not allowed during investigation!");
    }

});
</script>
<script>
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});
</script>
    <script>
document.onkeydown = function(e) {

if (e.keyCode == 123) {
return false; // F12
}

if (e.ctrlKey && e.key == "u") {
return false; // View source
}

if (e.ctrlKey && e.key == "c") {
return false; // Copy
}

};
</script>
<script>
function startFullscreen() {

let elem = document.documentElement;

if (elem.requestFullscreen) {
elem.requestFullscreen();
}

}
</script>
    
</body>
