<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<title>Murder Mystery</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
}

.column{
float:left;
width:33.33%;
padding:10px;
text-align:center;
}

.container{
text-align:center;
margin-top:80px;
}

.row{
background-color:rgba(0,0,0,0.7);
padding:20px;
}

.row .column{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
cursor:pointer;
}

.row .column h2{
font-size:32px;
}

.row::after{
content:"";
clear:both;
display:table;
}

/* modal */

.modal{
display:none;
position:fixed;
z-index:1;
left:0;
top:0;
width:100%;
height:100%;
overflow:auto;
background-color:rgba(0,0,0,0.7);
}

.modal-content{
background-color:#f4f4f4;
margin:15% auto;
padding:20px;
border:1px solid #888;
width:60%;
}

/* vault icon */

.top-right-image{
position:absolute;
top:10px;
right:10px;
}

</style>

</head>


<body>


<!-- VAULT BUTTON (NOW SAME TAB) -->

<a href="vault.html" class="top-right-image">
<img src="lock.png" style="width:100px;height:100px;">
</a>



<div class="container">
<h1 class="title">Welcome to victor office Room</h1>
</div>



<div class="container">

<div class="row">

<div class="column" onclick="openModal()">
<img src="clock.png" style="width:300px;height:410px;">
</div>


<div class="column">

<img src="MONA.jpeg" style="width:100px;height:100px;">

<h2>
LNBI <br>
EMBPVKL<br>
BX<br>
PZHLQZJ<br>
LZRR<br>
NZLC<br>
0 1 1 2 3 5 8
</h2>

</div>


<div class="column" onclick="playAudio()">
<img src="record.png" style="width:240px;height:330px;">
</div>

</div>

</div>



<!-- AUDIO -->

<audio id="audio" src="elise.mp3"></audio>



<!-- MODAL -->

<div id="myModal" class="modal">

<div class="modal-content">

<span onclick="closeModal()" style="cursor:pointer;font-size:30px;">&times;</span>

<p>

EFP JLPQ CXJLRP TLOHP FKZIRWB QEB JLKX IFPX<br>
XKA QEB IXPQ PRMM BO<br>
EB RPBA X QBZEKFNRB ZXIIBA PCRJXQL<br>
QL YIBKA ZLILOP PJLLQEIV<br>
BKLJLRP XQQBKQFLK QL ERJXK XKXQLJV<br>
<br>
(3^2 - 6) / (18/6) x (50/25) + 3

</p>

</div>

</div>



<script>

/* AUDIO */

function playAudio(){

document.getElementById("audio").play();

}


/* MODAL */

function openModal(){

document.getElementById("myModal").style.display="block";

}

function closeModal(){

document.getElementById("myModal").style.display="none";

}


/* TAB SWITCH DETECTION */

document.addEventListener("visibilitychange",function(){

if(document.hidden){

alert("SYSTEM ALERT: Investigation breach detected!");

window.location.href="about:blank";

}

});


/* DISABLE RIGHT CLICK */

document.addEventListener("contextmenu",function(e){

e.preventDefault();

});


/* BLOCK DEVTOOLS */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
}

});

</script>

</body>
</html>
